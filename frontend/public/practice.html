<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剑桥少儿英语拼写练习</title>
    <link rel="stylesheet" href="css/practice.css">
</head>
<body>
    <div class="container">
        <button class="settings-btn" onclick="showSettings()">设置</button>
        <button class="record-btn" onclick="showRecord()">学习记录</button>
        
        <h1>剑桥少儿英语拼写乐园</h1>
        
        <div class="stats">
            已练习: <span id="count">0</span> 个单词 | 
            正确率: <span id="accuracy">0%</span>
        </div>
        
        <div class="word-display">
            <div class="chinese-word" id="chinese-word">加载中...</div>
        </div>
        
        <div class="spelling-area" id="spelling-area"></div>
        
        <!-- 结果区域：正确答案 + 下一个按钮 -->
        <div class="result-area" id="result-area" style="display: none;">
            <span class="result-word" id="correct-word"></span>
            <button class="next-word-btn" onclick="goToNextWord()">下一个</button>
        </div>
        
        <div class="keyboard" id="keyboard"></div>
        
        <div class="action-buttons" id="action-buttons">
            <button class="key delete" onclick="deleteLetter()">删除</button>
            <button class="key submit" onclick="submitAnswer()">提交</button>
        </div>
    </div>
    
    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <div class="settings-header">
                <h2>设置</h2>
                <button class="close-btn" onclick="hideSettings()">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-item">
                    <div class="settings-label">练习模式：</div>
                    <div class="level-checkboxes">
                        <label class="checkbox-item">
                            <input type="radio" name="practice-mode" id="mode-normal" checked onchange="updatePracticeMode()">
                            <span class="checkmark"></span>
                            <span>正常练习</span>
                        </label>
                        <label class="checkbox-item wrong-mode">
                            <input type="radio" name="practice-mode" id="mode-wrong" onchange="updatePracticeMode()">
                            <span class="checkmark"></span>
                            <span>错词复习</span>
                        </label>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-label">单词范围：</div>
                    <div class="level-checkboxes">
                        <label class="checkbox-item starters">
                            <input type="checkbox" id="check-starters" checked onchange="updateLevelSelection()">
                            <span class="checkmark"></span>
                            <span>Pre A1 Starters</span>
                        </label>
                        <label class="checkbox-item movers">
                            <input type="checkbox" id="check-movers" checked onchange="updateLevelSelection()">
                            <span class="checkmark"></span>
                            <span>A1 Movers</span>
                        </label>
                        <label class="checkbox-item flyers">
                            <input type="checkbox" id="check-flyers" checked onchange="updateLevelSelection()">
                            <span class="checkmark"></span>
                            <span>A2 Flyers</span>
                        </label>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-label">数据管理：</div>
                    <button class="clear-btn" onclick="clearAllRecords()">清除学习记录</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 学习记录弹窗 -->
    <div class="record-modal" id="record-modal">
        <div class="record-content">
            <div class="record-header">
                <h2>学习记录</h2>
                <button class="close-btn" onclick="hideRecord()">&times;</button>
            </div>
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('learned')">已掌握</button>
                <button class="tab-btn" onclick="switchTab('wrong')">错词本</button>
                <button class="tab-btn" onclick="switchTab('unlearned')">未学习</button>
            </div>
            <div class="word-list" id="word-list">
                <!-- 单词列表将动态生成 -->
            </div>
        </div>
    </div>

    <!-- 引入外部词汇库和脚本 -->
    <script src="vocabulary.js"></script>
    <script src="js/practice.js"></script>
</body>
</html>
